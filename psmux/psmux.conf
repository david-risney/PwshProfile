# psmux configuration (tmux-compatible).
#
# Themed to match the rest of this profile: the oh-my-posh / Copilot prompt
# (oh-my-posh.json, copilot/statusline.omp.json) and the zellij "davris" theme
# (zellij/config.kdl). The left and right of the status bar are single
# multi-color "pills" whose segments overlap via rounded caps, exactly like the
# oh-my-posh prompt segments. Window tabs are individual rounded bubbles.
#
# psmux picks this file up via $env:PSMUX_CONFIG_FILE, which profile.ps1 sets
# to point here (mirroring how ZELLIJ_CONFIG_DIR points at the zellij folder).
#
# NOTE: psmux keeps a persistent server, so after editing this file run
#   psmux kill-server     (or: psmux source-file <this file>)
# and start psmux again for changes to take effect.
#
# Palette ###############################################################
#   dark-fg   #082336    light-fg  #e0e0e0    term-bg   default  (uses the terminal's own background; no hardcoding)
#   green     #00ff88    blue      #00bfff    purple    #ce5efe
#   yellow    #fffa6a    orange    #ffb56a    pink      #ff7092
#   cyan      #00e5e5    grey      #2b2b2b
# Bubble caps ŅéČ/Ņé┤ and the icons require a Nerd Font (already used by
# oh-my-posh here).  Ņ»ł is the dedicated tmux glyph (cod-terminal_tmux).
#########################################################################

# ---- General quality-of-life ----
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 10000
set -g status-interval 5
set -g cursor-style bar
set -g cursor-blink on

# ---- Status bar frame ----
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=#e0e0e0"
set -g status-left-length 60
set -g status-right-length 60

# Left pill: a green tmux-glyph segment overlapping into a blue session segment
# (one continuous pill, like the oh-my-posh prompt's leading segments).
set -g status-left "#[fg=#00ff88,bg=default]ŅéČ#[fg=#082336,bg=#00ff88,bold] Ņ»ł #[fg=#00ff88,bg=#00bfff]Ņé┤#[fg=#082336,bg=#00bfff,bold] #S #[fg=#00bfff,bg=default]Ņé┤ "

# Right side: transient indicator bubbles that only appear when active --
# prefix pressed (pink), pane zoomed (orange), synchronize-panes on (purple) --
# followed by an always-on blue "counts" anchor bubble showing the number of
# panes in the current window and windows in the session. No clock/date: those
# already live in the Windows UI.
set -g status-right "#{?client_prefix,#[fg=#ff7092]#[bg=default]ŅéČ#[fg=#082336]#[bg=#ff7092]#[bold] ’ä£ #[fg=#ff7092]#[bg=default]Ņé┤ ,}#{?window_zoomed_flag,#[fg=#ffb56a]#[bg=default]ŅéČ#[fg=#082336]#[bg=#ffb56a]#[bold] ’ĆÄ #[fg=#ffb56a]#[bg=default]Ņé┤ ,}#{?pane_synchronized,#[fg=#ce5efe]#[bg=default]ŅéČ#[fg=#082336]#[bg=#ce5efe]#[bold] Ņ®Ę #[fg=#ce5efe]#[bg=default]Ņé┤ ,}#[fg=#00bfff]#[bg=default]ŅéČ#[fg=#082336]#[bg=#00bfff]#[bold] ’āø #{window_panes} ’ŗÉ #{session_windows} #[fg=#00bfff]#[bg=default]Ņé┤ "

# ---- Windows: each tab is its own floating rounded bubble ----
set -g window-status-separator " "

# Inactive tab: blue bubble.
set -g window-status-format "#[fg=#00bfff,bg=default]ŅéČ#[fg=#082336,bg=#00bfff] #I #W #[fg=#00bfff,bg=default]Ņé┤"

# Active tab: purple bubble (echoes the oh-my-posh path segment).
set -g window-status-current-format "#[fg=#ce5efe,bg=default]ŅéČ#[fg=#082336,bg=#ce5efe,bold] #I #W #[fg=#ce5efe,bg=default]Ņé┤"

set -g window-status-activity-style "fg=#ff7092,bold"
set -g window-status-bell-style "fg=#ff7092,bold"

# ---- Panes ----
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#00ff88"

# ---- Messages and copy mode (pink/yellow accents from the palette) ----
set -g message-style "bg=#fffa6a,fg=#082336,bold"
set -g message-command-style "bg=default,fg=#fffa6a"
set -g mode-style "bg=#ff7092,fg=#082336,bold"

# ---- Popups (display-popup): rounded border, bright accent, theme-matched ----
# These global options ARE supported by psmux (menu-* globals are not).
set -g popup-style "bg=default,fg=#e0e0e0"
set -g popup-border-style "fg=#00ff88"
set -g popup-border-lines rounded

# ---- Quick-actions picker (Prefix + w) ----
# choose-tree can't take custom entries (and renders nothing in psmux), so
# Prefix + w opens a themed display-popup running psmux-picker.ps1. Because it is
# a popup it gets the rounded bright-green border set above, and the script paints
# its own truecolor palette inside: a live list of tabs & panes to jump to, plus
# New tab / New pane / Zoom / Rename / Close actions.
# The script path comes from $env:PSMUX_PICKER_SCRIPT (set in profile.ps1);
# default-shell is pwsh, which expands it. (Assumes a space-free repo path.)
bind-key w display-popup -E -w 64% -h 55% "pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File $env:PSMUX_PICKER_SCRIPT"
