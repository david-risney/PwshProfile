<!DOCTYPE html>
<html lang="en" data-theme="auto">
<!--
  code-tour viewer template.

  This file is a REUSABLE template. The code-tour skill produces a JSON "tour"
  document (see references/tour-schema.md) and embeds it by replacing the single
  placeholder token in the <script id="tour-data"> element below. The result is
  a single self-contained HTML file -- no network, no build step.

  Nothing else in this file needs to change per tour: all content, line
  numbers, and editor links are derived from the embedded JSON at runtime.
-->
<head>
<script>
  // Pin an explicit, fragment-less base URL before anything else is parsed.
  //
  // Section navigation puts the current section id in location.hash (e.g.
  // ...tour.html#plugin-observer). Chromium resolves an SVG's internal
  // references (url(#id) markers/gradients/filters/clip-paths) against the
  // document baseURI, which otherwise carries that #hash. For file:// URLs --
  // treated as unique security origins -- the resolved reference then looks
  // like an external sub-resource pointing back at the page itself, producing:
  //   "Unsafe attempt to load URL file:///...#section from frame with URL
  //    file:///...#section. 'file:' URLs are treated as unique security
  //    origins."
  // every time a Mermaid diagram is on a section. Setting <base> to the URL
  // with the fragment stripped makes baseURI fragment-less, so those internal
  // references resolve as local document references and the warning disappears.
  // In-page #section anchors and the relative ./mermaid.* loads still resolve
  // correctly against this base.
  (function () {
    try {
      var head = document.head || document.documentElement;
      if (!document.querySelector("base")) {
        var b = document.createElement("base");
        b.href = location.href.split("#")[0];
        head.insertBefore(b, head.firstChild);
      }
    } catch (e) {}
  })();
</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Inline SVG favicon (dashed line curving to a red X) as a data URI: keeps
     self-contained -- no network fetch, works over file://. -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%20fill='none'%3E%3Cpath%20d='M32%208%20L32%2042%20A10%2010%200%201%200%2042%2032%20L22%2032'%20stroke='%23e23b34'%20stroke-width='3'%20stroke-linecap='round'%20stroke-linejoin='round'%20stroke-dasharray='4%205'/%3E%3Cg%20stroke='%23e23b34'%20stroke-width='4.5'%20stroke-linecap='round'%3E%3Cline%20x1='18'%20y1='26'%20x2='8'%20y2='38'/%3E%3Cline%20x1='8'%20y1='26'%20x2='18'%20y2='38'/%3E%3C/g%3E%3C/svg%3E">
<title>Code tour</title>
<style>
  :root {
    /* Dark theme (default; also used by "auto" when the OS prefers dark). */
    /* Neutrals carry a slight cool tint (<5% HSB saturation) to match the
       blue accent; near-black rather than pure #000 (saferules 1, 2, 10). */
    --bg: #1e1f22; --panel: #26282c; --fg: #d5d7db; --muted: #9a9ca2;
    --accent: #4fc1ff; --accent-hover: #79d0ff;
    --accent2: #c586c0; --accent2-hover: #d6a4d6;
    --green: #6a9955; --orange: #ce9178;
    --keyword: #569cd6; --border: #3a3d43; --warn: #f0a500; --danger: #f48771;
    --callout-bg: #2d2f34; --code-bg: #2a2c30; --pre-bg: #1b1c1f;
    /* Saturated per-type box fills so callouts / see-also read distinctly
       rather than all looking gray. */
    --info-bg: #24333f; --good-bg: #1f2e22; --warn-bg: #332e1e; --diagram-bg: #241d31;
    --sig-fg: #dcdcaa; --error-bg: #3c2727; --error-fg: #f5c0b8;
  }
  /* Light palette: applied when forced via data-theme="light" ... */
  html[data-theme="light"] {
    /* Near-white background + cool-tinted neutrals (saferules 1, 2, 10). */
    --bg: #fbfbfd; --panel: #eef0f4; --fg: #1e2024; --muted: #676a71;
    --accent: #0066b8; --accent-hover: #1a7fd4;
    --accent2: #9b298f; --accent2-hover: #b5429f;
    --green: #2e7d32; --orange: #b5500a;
    --keyword: #0000ff; --border: #cdd0d6; --warn: #b8860b; --danger: #c0392b;
    --callout-bg: #f3f4f7; --code-bg: #eceff3; --pre-bg: #f2f3f6;
    --info-bg: #e8eef4; --good-bg: #e6efe8; --warn-bg: #f1edde; --diagram-bg: #efebf6;
    --sig-fg: #7a5b00; --error-bg: #f7efee; --error-fg: #8b1f17;
  }
  /* ... or via "auto" when the OS itself prefers a light color scheme. */
  @media (prefers-color-scheme: light) {
    html[data-theme="auto"] {
      --bg: #fbfbfd; --panel: #eef0f4; --fg: #1e2024; --muted: #676a71;
      --accent: #0066b8; --accent-hover: #1a7fd4;
      --accent2: #9b298f; --accent2-hover: #b5429f;
      --green: #2e7d32; --orange: #b5500a;
      --keyword: #0000ff; --border: #cdd0d6; --warn: #b8860b; --danger: #c0392b;
      --callout-bg: #f3f4f7; --code-bg: #eceff3; --pre-bg: #f2f3f6;
      --info-bg: #e8eef4; --good-bg: #e6efe8; --warn-bg: #f1edde; --diagram-bg: #efebf6;
      --sig-fg: #7a5b00; --error-bg: #f7efee; --error-fg: #8b1f17;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 16px/1.6 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    transition: background 0.2s ease, color 0.2s ease;
  }
  header {
    position: sticky; top: 0; z-index: 10; background: var(--panel);
    border-bottom: 1px solid var(--border); padding: 16px 24px;
  }
  header h1 { margin: 0 0 4px; font-size: 18px; }
  header p { margin: 0; color: var(--muted); font-size: 13px; }
  .current-group {
    margin: 6px 0 0; font-size: 12px; font-weight: 600; letter-spacing: .02em;
    color: var(--accent);
  }
  .current-group[hidden] { display: none; }
  .current-group::before { content: "\25B8\00a0"; }
  .header-inner {
    max-width: 980px; margin: 0 auto; display: flex; align-items: flex-start;
    justify-content: space-between; gap: 16px;
  }
  .header-left { display: flex; align-items: flex-start; gap: 14px; min-width: 0; }
  .tour-logo { flex: none; width: 44px; height: 44px; margin-top: 2px; }
  #theme-toggle {
    flex: none; cursor: pointer; font: inherit; font-size: 13px;
    color: var(--fg); background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; white-space: nowrap;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  #theme-toggle:hover { border-color: var(--accent); }
  #theme-toggle .ico { margin-right: 6px; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 0 24px 80px; }
  /* Callouts, see-also, diagrams, and the error box share the code block's
     boxed look (see `pre`): a 1px solid border and 6px radius. Each type also
     gets a saturated, hue-matched fill so the family is easy to tell apart at a
     glance -- blue for informational see-also / default callouts, green for
     good, yellow for warnings/dangers, purple for diagrams, red for errors --
     while the neutral code block stays the visual anchor. */
  .callout, .see-also {
    background: var(--info-bg); border: 1px solid var(--accent);
    border-radius: 6px;
  }
  .callout { padding: 12px 16px; margin: 18px 0; font-size: 14px; }
  .callout.warn, .callout.danger { border-color: var(--warn); background: var(--warn-bg); }
  .callout.good { border-color: var(--green); background: var(--good-bg); }
  .callout code { color: var(--orange); }
  .see-also { padding: 10px 16px; margin: 18px 0; font-size: 13px; }
  .see-also .sa-head {
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    font-size: 11px; opacity: 0.75; margin-bottom: 6px;
  }
  .see-also .sa-topic { margin: 3px 0; }
  .see-also .sa-name { font-weight: 600; }
  .see-also a { color: var(--accent); }
  h2 {
    margin: 40px 0 8px; padding-top: 16px; border-top: 1px solid var(--border);
    font-size: 20px; color: var(--accent);
  }
  h2:first-of-type { border-top: none; }
  .sig {
    font-family: "Cascadia Code", Consolas, "Courier New", monospace;
    color: var(--sig-fg); font-size: 14px;
  }
  a.line {
    display: inline-block; font-family: "Cascadia Code", Consolas, monospace;
    font-size: 12px; text-decoration: none; color: var(--bg);
    background: var(--accent); border-radius: 4px; padding: 1px 8px;
    margin-left: 6px; vertical-align: middle; white-space: nowrap;
  }
  a.line:hover { background: var(--accent-hover); }
  a.line.range { background: var(--accent2); }
  a.line.range:hover { background: var(--accent2-hover); }
  code {
    font-family: "Cascadia Code", Consolas, "Courier New", monospace;
    background: var(--code-bg); padding: 1px 5px; border-radius: 4px; font-size: 13px;
    color: var(--orange);
  }
  pre {
    background: var(--pre-bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px 14px; overflow-x: auto; font-size: 13px; line-height: 1.5;
    font-family: "Cascadia Code", Consolas, "Courier New", monospace; color: var(--fg);
    white-space: pre;
  }
  .filetag {
    font-family: "Cascadia Code", Consolas, monospace; font-size: 12px;
    color: var(--muted); margin-left: 8px;
  }
  ul { margin: 6px 0 6px; padding-left: 22px; }
  li { margin: 3px 0; }
  .toc { columns: 2; column-gap: 32px; font-size: 14px; }
  .toc a { color: var(--accent); text-decoration: none; }
  .toc a:hover { text-decoration: underline; }
  .group-toc {
    border-left: 3px solid var(--accent); padding: 6px 0 6px 14px; margin: 14px 0;
  }
  .group-toc-name {
    display: block; font-weight: 600; font-size: 15px; color: var(--accent);
    text-decoration: none; margin-bottom: 2px;
  }
  a.group-toc-name:hover { text-decoration: underline; }
  .group-toc-desc { color: var(--muted); font-size: 13px; margin: 0 0 8px; }
  .group-header {
    border-top: 3px solid var(--accent); margin: 64px 0 8px; padding-top: 16px;
  }
  .group-eyebrow {
    display: block; font-size: 12px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--muted); margin: 0 0 4px;
  }
  .group-name {
    color: var(--accent); margin: 0; border-top: none; padding-top: 0;
    font-size: 27px; font-weight: 700; letter-spacing: .005em;
  }
  .group-desc { color: var(--muted); font-size: 14px; margin: 8px 0 0; }
  /* Section headings sit visually subordinate to group banners: smaller,
     indented, with the number rendered as a rounded pill rather than inline
     text — so groups and sections are never confused at a glance. */
  h2.section-heading {
    font-size: 18px; font-weight: 600; padding-left: 16px;
  }
  .sec-num {
    display: inline-block; min-width: 1.5em; text-align: center;
    font-size: 12px; font-weight: 700; line-height: 1.5; color: var(--accent);
    border: 1px solid var(--accent); border-radius: 999px;
    padding: 0 8px; margin-right: 10px; vertical-align: 2px;
  }
  footer { color: var(--muted); font-size: 12px; margin-top: 48px; text-align: center; }
  footer a { color: inherit; text-decoration: underline; }
  .flow { font-size: 14px; }
  .flow b { color: var(--sig-fg); }
  pre.mermaid {
    background: var(--diagram-bg); color: #1b1b1b;
    border: 1px solid var(--accent2); border-radius: 6px;
    text-align: center; line-height: normal; white-space: normal;
    padding: 16px;
  }
  pre.mermaid:not([data-processed]) {
    /* Before Mermaid runs (or if it cannot load), show the raw source. */
    background: var(--pre-bg); color: var(--muted); text-align: left; white-space: pre;
    font-family: "Cascadia Code", Consolas, "Courier New", monospace; font-size: 13px;
  }
  .diagram-title {
    color: var(--muted); font-size: 13px; margin: 14px 0 4px; font-style: italic;
  }
  #error {
    background: var(--error-bg); border: 1px solid var(--danger); border-radius: 6px;
    padding: 16px; margin: 24px; color: var(--error-fg); font-size: 14px;
  }
</style>
<script>
  // Apply the saved theme as early as possible to avoid a flash of the wrong
  // colors. Valid values: "auto" (follow the OS), "light", "dark".
  (function () {
    try {
      var saved = localStorage.getItem("codeTourTheme");
      if (saved === "light" || saved === "dark" || saved === "auto") {
        document.documentElement.setAttribute("data-theme", saved);
      }
    } catch (e) { /* localStorage may be unavailable (e.g. file:// + strict mode) */ }
  })();
</script>
</head>
<body>

<!-- The tour content is embedded here as JSON. The code-tour skill replaces
     the single placeholder token below with a real tour document. The exact
     token appears nowhere else in this file, so a plain text replace is safe. -->
<script id="tour-data" type="application/json">__TOUR_JSON__</script>

<header>
  <div class="header-inner">
    <div class="header-left">
      <svg class="tour-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="code-tour logo">
        <path d="M32 8 L32 42 A10 10 0 1 0 42 32 L22 32"
              stroke="#e23b34" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
              stroke-dasharray="4 5"/>
        <g stroke="#e23b34" stroke-width="4.5" stroke-linecap="round">
          <line x1="18" y1="26" x2="8" y2="38"/>
          <line x1="8" y1="26" x2="18" y2="38"/>
        </g>
      </svg>
      <div>
        <h1 id="tour-title">Code tour</h1>
        <p id="tour-subtitle"></p>
        <p id="tour-current-group" class="current-group" hidden></p>
      </div>
    </div>
    <button id="theme-toggle" type="button" aria-label="Toggle color theme"
            title="Toggle light / dark / auto theme"></button>
  </div>
</header>

<div class="wrap" id="content"></div>

<script>
"use strict";

// --- Load the embedded tour -------------------------------------------------

function loadTour() {
  var raw = document.getElementById("tour-data").textContent;
  // The placeholder token, split so this guard does not itself contain it.
  var placeholder = "__TOUR" + "_JSON__";
  if (raw.indexOf(placeholder) !== -1) {
    throw new Error("This template has not been filled in: the JSON " +
      "placeholder is still present. Run the code-tour skill to embed a tour.");
  }
  return JSON.parse(raw);
}

// --- Editor / web link building ---------------------------------------------
// A tour maps each logical file name to a link source in tour.files. An entry
// is either a string (an absolute LOCAL path, used for vscode:// editor links)
// or an object with any of:
//   path     absolute local path       -> vscode / vscode-insiders editor link
//   url      per-file web URL template -> web link; may contain {line}/{lineEnd}
//   webPath  repo-relative / URL path  -> fills {path} in tour.webUrlTemplate
// A line reference resolves in this order, so the same JSON drives a local tour
// or a PR/commit tour just by choosing which fields it fills:
//   1. the entry's own `url`         (any https link, e.g. one PR file)
//   2. tour.webUrlTemplate           (one base shared by every file)
//   3. tour.webUrlBase               (legacy GitHub "#L" style, back-compat)
//   4. a vscode editor link          (default, from the local path)
// Templates use {path}, {line} and {lineEnd} placeholders; {lineEnd} defaults
// to {line} for single-line badges so hosts that require a range still work.

function fileEntry(tour, file) {
  if (tour.files && Object.prototype.hasOwnProperty.call(tour.files, file)) {
    return tour.files[file];
  }
  return file; // fall back to the logical name if unmapped
}

function entryLocalPath(entry, file) {
  if (entry && typeof entry === "object") return entry.path || file;
  return entry; // string form is the local path
}

function entryWebPath(entry, file) {
  if (entry && typeof entry === "object") return entry.webPath || entry.path || file;
  return entry; // string form doubles as the web path
}

function fillTemplate(tmpl, vars) {
  var out = tmpl;
  for (var k in vars) {
    if (Object.prototype.hasOwnProperty.call(vars, k)) {
      out = out.split("{" + k + "}").join(vars[k]);
    }
  }
  return out;
}

function fileAbsPath(tour, file) {
  return entryLocalPath(fileEntry(tour, file), file);
}

function lineHref(tour, file, start, end) {
  var entry = fileEntry(tour, file);
  var lineEnd = (end && end !== start) ? end : start;
  // 1. Per-file web URL template (any https link, e.g. a single PR file).
  if (entry && typeof entry === "object" && entry.url) {
    return fillTemplate(entry.url, { line: start, lineEnd: lineEnd });
  }
  // 2. Global web URL template shared by every file (one commit / PR base).
  if (tour.webUrlTemplate) {
    return fillTemplate(tour.webUrlTemplate,
      { path: entryWebPath(entry, file), line: start, lineEnd: lineEnd });
  }
  // 3. Legacy GitHub-style base; fragment syntax varies by host.
  if (tour.webUrlBase) {
    return tour.webUrlBase + encodeURIComponent(entryWebPath(entry, file)) + "#L" + start;
  }
  // 4. Local editor link.
  var scheme = tour.editor === "vscode-insiders"
    ? "vscode-insiders://file/" : "vscode://file/";
  return scheme + entryLocalPath(entry, file) + ":" + start;
}

function lineBadge(tour, file, start, end, label) {
  var a = document.createElement("a");
  var isRange = end && end !== start;
  a.className = isRange ? "line range" : "line";
  a.href = lineHref(tour, file, start, end);
  a.textContent = label || (isRange ? ("lines " + start + "\u2013" + end)
                                    : ("line " + start));
  a.title = "Open " + file + " at line " + start;
  return a;
}

// --- Minimal, injection-safe markdown ---------------------------------------
// HTML is escaped FIRST, so embedded text can never inject markup. Then a small
// set of conveniences is layered on:
//   `code`            inline code
//   **bold**          strong
//   [text](url)       link (http/https/vscode schemes only)
//   [[12]] [[12-20]]  line badge for the section's file
//   [[file:12-20]]    line badge for an explicit file
// Blank lines split paragraphs; lines starting with "- " become a list.

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function safeUrl(url) {
  return /^(https?:|vscode(-insiders)?:|#|mailto:)/i.test(url) ? url : "#";
}

function renderInline(tour, file, text) {
  var html = escapeHtml(text);
  // [[file:start-end]] or [[start-end]] line badges (operate before other
  // inline rules; tokens contain only safe characters).
  html = html.replace(/\[\[([^\]]+)\]\]/g, function (_m, body) {
    var f = file, range = body;
    var colon = body.indexOf(":");
    if (colon !== -1) { f = body.slice(0, colon); range = body.slice(colon + 1); }
    var parts = range.split("-");
    var start = parseInt(parts[0], 10);
    var end = parts[1] ? parseInt(parts[1], 10) : null;
    if (isNaN(start)) { return _m; }
    return lineBadge(tour, f, start, end).outerHTML;
  });
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_m, label, url) {
    return '<a href="' + safeUrl(url) + '">' + label + "</a>";
  });
  return html;
}

// Render a markdown block (paragraphs + "- " bullet lists) into a container.
function renderMarkdown(tour, file, text, container) {
  if (!text) { return; }
  var blocks = String(text).split(/\n\s*\n/);
  blocks.forEach(function (block) {
    var lines = block.split("\n");
    var isList = lines.every(function (l) { return /^\s*-\s+/.test(l) || l.trim() === ""; })
                 && lines.some(function (l) { return /^\s*-\s+/.test(l); });
    if (isList) {
      var ul = document.createElement("ul");
      lines.forEach(function (l) {
        var m = l.match(/^\s*-\s+(.*)$/);
        if (m) {
          var li = document.createElement("li");
          li.innerHTML = renderInline(tour, file, m[1]);
          ul.appendChild(li);
        }
      });
      container.appendChild(ul);
    } else {
      var p = document.createElement("p");
      p.innerHTML = renderInline(tour, file, block.replace(/\n/g, " "));
      container.appendChild(p);
    }
  });
}

function renderCallouts(tour, file, callouts, container) {
  (callouts || []).forEach(function (c) {
    var div = document.createElement("div");
    div.className = "callout" + (c.type ? " " + c.type : "");
    renderMarkdown(tour, file, c.text, div);
    container.appendChild(div);
  });
}

// --- "See also" further-reading links ---------------------------------------
// A section may list related topics worth understanding (a function, a language
// feature, a pattern like sequences / GUARDED_BY_CONTEXT). Each entry is
// { topic, links[] } where a link is a URL string or { label?, url }. These are
// external link *targets* only — nothing the viewer needs to render is remote,
// so the output stays self-contained/offline.

function seeAlsoHost(url) {
  var m = /^[a-zA-Z][a-zA-Z0-9+.-]*:\/\/([^/]+)/.exec(String(url));
  var host = m ? m[1] : String(url);
  return host.replace(/^www\./, "");
}

// Optional top-level `source`: a URL string or {label?, url|href}. Returns
// {label, url} or null.
function sourceLink(source) {
  if (!source) return null;
  var url, label;
  if (typeof source === "object") {
    url = source.url || source.href || "";
    label = source.label || "View source";
  } else {
    url = String(source);
    label = "View source";
  }
  return url ? { label: label, url: url } : null;
}

function renderSeeAlso(seeAlso, container) {
  if (!seeAlso || !seeAlso.length) return;
  var box = document.createElement("div");
  box.className = "see-also";
  var head = document.createElement("div");
  head.className = "sa-head";
  head.textContent = "See also";
  box.appendChild(head);
  seeAlso.forEach(function (sa) {
    var row = document.createElement("div");
    row.className = "sa-topic";
    var links = (sa.links || []).filter(function (ln) {
      return ln && (typeof ln === "object" ? (ln.url || ln.href) : true);
    });
    var name = document.createElement("span");
    name.className = "sa-name";
    name.textContent = (sa.topic || "") + (links.length ? ": " : "");
    row.appendChild(name);
    links.forEach(function (ln, i) {
      var url = typeof ln === "object" ? (ln.url || ln.href) : ln;
      var label = (typeof ln === "object" && ln.label) ? ln.label : seeAlsoHost(url);
      if (i > 0) row.appendChild(document.createTextNode(" \u00b7 "));
      var a = document.createElement("a");
      a.href = url;
      a.textContent = label;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.title = url;
      row.appendChild(a);
    });
    box.appendChild(row);
  });
  container.appendChild(box);
}

// --- Mermaid diagrams -------------------------------------------------------
// A tour may attach Mermaid diagrams to its intro and to any section. Each
// diagram is either a raw Mermaid string or an object { title?, code }. We emit
// a <pre class="mermaid"> holding the Mermaid SOURCE as textContent (never
// interpreted as HTML); the module bootstrap at the end of <body> turns those
// blocks into rendered SVG via the local Mermaid copy. If Mermaid cannot load,
// the source stays visible as a plain code block.

function diagramSource(d) {
  if (typeof d === "string") { return d; }
  if (d && typeof d === "object") { return d.code || d.mermaid || ""; }
  return "";
}

function renderDiagrams(diagrams, container) {
  (diagrams || []).forEach(function (d) {
    var src = diagramSource(d);
    if (!src) { return; }
    if (d && typeof d === "object" && d.title) {
      var cap = document.createElement("p");
      cap.className = "diagram-title";
      cap.textContent = d.title;
      container.appendChild(cap);
    }
    var pre = document.createElement("pre");
    pre.className = "mermaid";
    pre.textContent = src; // textContent: Mermaid source is data, never markup
    container.appendChild(pre);
  });
}

// --- Top-level render -------------------------------------------------------

// A group's display name accepts either "title" or the "name" alias.
function groupName(g) {
  return g.title || g.name || "";
}

// Strips a redundant leading ordinal (e.g. "1. ", "2) ") from an authored
// group title, so the template can supply its own "Group N" label without
// showing the number twice.
function stripLeadingOrdinal(text) {
  return (text || "").replace(/^\s*\d+[.)]\s*/, "");
}

function render(tour) {
  document.title = tour.title || "Code tour";
  document.getElementById("tour-title").textContent = tour.title || "Code tour";
  var sub = document.getElementById("tour-subtitle");
  sub.textContent = "";
  var src = sourceLink(tour.source);
  if (tour.subtitle) {
    sub.appendChild(document.createTextNode(tour.subtitle));
  }
  if (src) {
    if (tour.subtitle) { sub.appendChild(document.createTextNode(" \u00b7 ")); }
    var srcAnchor = document.createElement("a");
    srcAnchor.href = src.url;
    srcAnchor.textContent = src.label;
    srcAnchor.target = "_blank";
    srcAnchor.rel = "noopener";
    sub.appendChild(srcAnchor);
  }
  if (!tour.subtitle && !src) {
    sub.textContent = "Click any line badge to jump to that line in your editor.";
  }

  var content = document.getElementById("content");
  var sections = tour.sections || [];

  // Intro
  if (tour.intro) {
    var introWrap = document.createElement("div");
    renderMarkdown(tour, null, tour.intro, introWrap);
    content.appendChild(introWrap);
  }
  renderDiagrams(tour.diagrams, content);

  // Optional "design notes" good-callout with bullets
  if (tour.designNotes && tour.designNotes.length) {
    var dn = document.createElement("div");
    dn.className = "callout good";
    var ul = document.createElement("ul");
    tour.designNotes.forEach(function (note) {
      var li = document.createElement("li");
      li.innerHTML = renderInline(tour, null, note);
      ul.appendChild(li);
    });
    dn.appendChild(ul);
    content.appendChild(dn);
  }

  // Table of contents + sections, honoring optional groups.
  var sectionsById = {};
  sections.forEach(function (s, i) { sectionsById[s.id || ("section-" + i)] = s; });

  // Rendered order: grouped sections first (in group + listed order), then any
  // ungrouped sections in their original order. Each entry carries its display
  // number and whether it starts a new group.
  var groups = tour.groups || [];
  var ordered = [];
  var used = {};
  groups.forEach(function (g) {
    (g.sections || []).forEach(function (sid) {
      var s = sectionsById[sid];
      if (s && !used[sid]) { used[sid] = true; ordered.push({ section: s, group: g }); }
    });
  });
  sections.forEach(function (s, i) {
    var sid = s.id || ("section-" + i);
    if (!used[sid]) { used[sid] = true; ordered.push({ section: s, group: null }); }
  });
  var prevGroup;
  ordered.forEach(function (entry, idx) {
    entry.number = entry.section.number != null ? entry.section.number : (idx + 1);
    entry.groupStart = entry.group && entry.group !== prevGroup;
    prevGroup = entry.group;
  });
  var numberById = {};
  ordered.forEach(function (entry, i) {
    numberById[entry.section.id || ("section-" + i)] = entry.number;
  });

  function tocLink(s, sid) {
    var a = document.createElement("a");
    a.href = "#" + sid;
    a.textContent = (numberById[sid] != null ? numberById[sid] : "") + ". " + (s.title || "");
    return a;
  }

  if (ordered.length) {
    var tocH = document.createElement("h2");
    tocH.textContent = "Contents";
    content.appendChild(tocH);

    if (groups.length) {
      // Grouped table of contents: each group is a named, described bucket.
      groups.forEach(function (g, gi) {
        var box = document.createElement("div");
        box.className = "group-toc";
        var name = document.createElement("a");
        name.className = "group-toc-name";
        name.href = "#" + (g.id || ("group-" + gi));
        name.textContent = "Group " + (gi + 1) + " \u00b7 "
          + stripLeadingOrdinal(groupName(g));
        box.appendChild(name);
        if (g.description) {
          var desc = document.createElement("p");
          desc.className = "group-toc-desc";
          desc.innerHTML = renderInline(tour, null, g.description);
          box.appendChild(desc);
        }
        var toc = document.createElement("div");
        toc.className = "toc";
        (g.sections || []).forEach(function (sid) {
          var s = sectionsById[sid];
          if (!s) { return; }
          toc.appendChild(tocLink(s, sid));
          toc.appendChild(document.createElement("br"));
        });
        box.appendChild(toc);
        content.appendChild(box);
      });
      // Any sections not placed in a group.
      var orphans = ordered.filter(function (e) { return !e.group; });
      if (orphans.length) {
        var box2 = document.createElement("div");
        box2.className = "group-toc";
        var nm = document.createElement("span");
        nm.className = "group-toc-name";
        nm.textContent = "Other";
        box2.appendChild(nm);
        var toc2 = document.createElement("div");
        toc2.className = "toc";
        orphans.forEach(function (e, i) {
          var sid = e.section.id || ("section-" + i);
          toc2.appendChild(tocLink(e.section, sid));
          toc2.appendChild(document.createElement("br"));
        });
        box2.appendChild(toc2);
        content.appendChild(box2);
      }
    } else {
      // Flat table of contents.
      var toc = document.createElement("div");
      toc.className = "toc";
      ordered.forEach(function (entry, i) {
        var sid = entry.section.id || ("section-" + i);
        toc.appendChild(tocLink(entry.section, sid));
        toc.appendChild(document.createElement("br"));
      });
      content.appendChild(toc);
    }
  }

  // Sections (in rendered order), with a banner before each group's first one.
  // While rendering, collect group-boundary markers (the banner that starts
  // each group, plus the first ungrouped section after any groups) so the
  // sticky header can show which group the reader is currently scrolled into.
  var groupMarkers = [];
  var sawGroup = false, sawOrphan = false;
  ordered.forEach(function (entry, i) {
    var s = entry.section;
    if (entry.groupStart) {
      var gi = groups.indexOf(entry.group);
      var gnum = gi + 1;
      var gtitle = stripLeadingOrdinal(groupName(entry.group));
      var banner = document.createElement("div");
      banner.className = "group-header";
      banner.id = entry.group.id || ("group-" + gi);
      var eyebrow = document.createElement("span");
      eyebrow.className = "group-eyebrow";
      eyebrow.textContent = "Group " + gnum;
      banner.appendChild(eyebrow);
      var gname = document.createElement("h2");
      gname.className = "group-name";
      gname.textContent = gtitle;
      banner.appendChild(gname);
      if (entry.group.description) {
        var gdesc = document.createElement("p");
        gdesc.className = "group-desc";
        gdesc.innerHTML = renderInline(tour, null, entry.group.description);
        banner.appendChild(gdesc);
      }
      content.appendChild(banner);
      groupMarkers.push({ el: banner, name: "Group " + gnum + ": " + gtitle });
      sawGroup = true;
    }

    var h = document.createElement("h2");
    h.className = "section-heading";
    h.id = s.id || ("section-" + i);
    var num = entry.number;
    var secNum = document.createElement("span");
    secNum.className = "sec-num";
    secNum.textContent = num;
    h.appendChild(secNum);
    var titleSpan = document.createElement("span");
    titleSpan.innerHTML = renderInline(tour, s.file, s.title || "");
    h.appendChild(titleSpan);
    if (s.file && s.lineStart) {
      h.appendChild(lineBadge(tour, s.file, s.lineStart, s.lineEnd));
    }
    if (s.file) {
      var ft = document.createElement("span");
      ft.className = "filetag";
      ft.textContent = s.file;
      h.appendChild(ft);
    }
    content.appendChild(h);

    // First ungrouped section after one or more groups: entering the "Other"
    // region, so the header label should clear (name: null).
    if (!entry.group && sawGroup && !sawOrphan) {
      groupMarkers.push({ el: h, name: null });
      sawOrphan = true;
    }
    renderMarkdown(tour, s.file, s.body, content);

    if (s.code) {
      // `code` is specified as a string. Tolerate accidental non-string shapes
      // ({ lines }/{ code }/{ text } or string[]) instead of rendering the
      // useless placeholder that String(object) would produce.
      var codeText = s.code;
      if (typeof codeText !== "string") {
        codeText = Array.isArray(codeText)
          ? codeText.join("\n")
          : (codeText.lines || codeText.code || codeText.text || "");
      }
      if (codeText) {
        var pre = document.createElement("pre");
        pre.textContent = codeText; // textContent: never interprets code as HTML
        content.appendChild(pre);
      }
    }

    renderCallouts(tour, s.file, s.callouts, content);

    renderDiagrams(s.diagrams, content);

    // Optional explicit "jump to" anchors (labeled sub-line links)
    if (s.anchors && s.anchors.length) {
      var jump = document.createElement("p");
      jump.appendChild(document.createTextNode("Jump to: "));
      s.anchors.forEach(function (an) {
        jump.appendChild(lineBadge(tour, an.file || s.file, an.lineStart,
                                   an.lineEnd, an.label));
      });
      content.appendChild(jump);
    }

    renderSeeAlso(s.seeAlso, content);
  });

  // Optional data-flow summary
  if (tour.dataFlow) {
    var fh = document.createElement("h2");
    fh.textContent = "Putting it together \u2014 the data flow";
    content.appendChild(fh);
    var flow = document.createElement("div");
    flow.className = "flow";
    renderMarkdown(tour, null, tour.dataFlow, flow);
    content.appendChild(flow);
  }

  // Footer
  var footer = document.createElement("footer");
  var genLink = document.createElement("a");
  genLink.href = "https://github.com/david-risney/PwshProfile/tree/main/plugins/code-tour";
  genLink.textContent = "Generated code tour";
  genLink.target = "_blank";
  genLink.rel = "noopener";
  footer.appendChild(genLink);
  if (tour.generatorVersion) {
    footer.appendChild(document.createTextNode(" \u00b7 v" + tour.generatorVersion));
  }
  content.parentNode.insertBefore(footer, content.nextSibling);

  setupGroupTracking(groupMarkers);
}

// --- Sticky-header group tracking -------------------------------------------

// Updates the header's #tour-current-group label to the group the reader is
// currently scrolled into. `markers` is an ordered list of { el, name } where
// el is a group banner (or the first ungrouped section heading) and name is the
// group's display name (or null to clear the label). Elements are in document
// order, so their viewport tops increase monotonically.
function setupGroupTracking(markers) {
  var label = document.getElementById("tour-current-group");
  if (!label || !markers || !markers.length) {
    return;
  }
  var header = document.querySelector("header");

  function update() {
    // A marker is "passed" once its top scrolls up under the sticky header.
    var threshold = (header ? header.getBoundingClientRect().bottom : 0) + 4;
    var currentName = null;
    for (var i = 0; i < markers.length; i++) {
      if (markers[i].el.getBoundingClientRect().top <= threshold) {
        currentName = markers[i].name;
      } else {
        break;
      }
    }
    if (currentName) {
      if (label.textContent !== currentName) {
        label.textContent = currentName;
      }
      label.hidden = false;
    } else {
      label.hidden = true;
      label.textContent = "";
    }
  }

  var ticking = false;
  function onScroll() {
    if (!ticking) {
      ticking = true;
      window.requestAnimationFrame(function () { update(); ticking = false; });
    }
  }
  window.addEventListener("scroll", onScroll, { passive: true });
  window.addEventListener("resize", onScroll);
  update();
}

// --- Theme toggle -----------------------------------------------------------

// Cycle the header button through "auto" -> "light" -> "dark" -> "auto",
// persisting the choice in localStorage. "auto" follows the OS color scheme
// via the CSS media query; "light"/"dark" force a palette regardless of the OS.
function setupThemeToggle() {
  var btn = document.getElementById("theme-toggle");
  if (!btn) { return; }
  var ORDER = ["auto", "light", "dark"];
  var LABEL = {
    auto: { ico: "\uD83D\uDDA5\uFE0F", text: "Auto" },   // desktop
    light: { ico: "\u2600\uFE0F", text: "Light" },        // sun
    dark: { ico: "\uD83C\uDF19", text: "Dark" }           // crescent moon
  };

  function current() {
    var t = document.documentElement.getAttribute("data-theme");
    return (t === "light" || t === "dark") ? t : "auto";
  }
  function paint(theme) {
    var meta = LABEL[theme] || LABEL.auto;
    btn.innerHTML = "";
    var ico = document.createElement("span");
    ico.className = "ico";
    ico.textContent = meta.ico;
    btn.appendChild(ico);
    btn.appendChild(document.createTextNode(meta.text));
    btn.setAttribute("title", "Theme: " + meta.text + " (click to change)");
  }
  function apply(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    try { localStorage.setItem("codeTourTheme", theme); } catch (e) { /* ignore */ }
    paint(theme);
    // Recolor any Mermaid diagrams to match the newly applied scheme.
    if (typeof window.__renderTourDiagrams === "function") {
      window.__renderTourDiagrams();
    }
  }

  paint(current());
  btn.addEventListener("click", function () {
    var next = ORDER[(ORDER.indexOf(current()) + 1) % ORDER.length];
    apply(next);
  });
}

// --- Boot -------------------------------------------------------------------

try {
  render(loadTour());
} catch (err) {
  var e = document.createElement("div");
  e.id = "error";
  e.textContent = "Could not render this code tour: " + err.message;
  document.body.appendChild(e);
}
setupThemeToggle();
</script>

<!-- Embedded Mermaid runtime. When the tour has diagrams, the build script
     replaces the placeholder token below with the self-contained Mermaid UMD
     bundle, which assigns the library to globalThis.mermaid. When the tour has
     no diagrams the token is replaced with nothing. This keeps the rendered
     tour a single self-contained file: no sidecar mermaid.* files and no
     network fetch. This script must run BEFORE the bootstrap below so that
     window.mermaid is already defined when the bootstrap looks for it. -->
<script id="mermaid-runtime">__MERMAID_RUNTIME__</script>

<!-- Mermaid bootstrap. Runs only if the tour produced any
     <pre class="mermaid"> blocks. Preferred path: the embedded runtime above
     already defined window.mermaid, so render immediately -- no network, no
     ES-module load, works over file://. The remaining branches are a legacy
     fallback for a tour rendered without the embedded runtime, loading a
     sidecar UMD bundle (mermaid.min.js) or local ES module. If nothing loads,
     the Mermaid source stays visible as a code block. -->
<script>
(function () {
  "use strict";
  var blocks = document.querySelectorAll("pre.mermaid");
  if (!blocks.length) { return; }

  // Preserve each diagram's Mermaid source: mermaid.run() replaces the source
  // with rendered SVG, so we keep the originals to re-render when the color
  // theme changes.
  var sources = [];
  for (var i = 0; i < blocks.length; i++) { sources.push(blocks[i].textContent); }

  // Resolve the effective light/dark scheme: an explicit data-theme wins;
  // "auto" (or unset) follows the OS via matchMedia.
  function isDark() {
    var t = document.documentElement.getAttribute("data-theme");
    if (t === "dark") { return true; }
    if (t === "light") { return false; }
    return !!(window.matchMedia &&
      window.matchMedia("(prefers-color-scheme: dark)").matches);
  }

  var mermaidRef = null;

  // (Re)render every diagram with the Mermaid theme that matches the current
  // color scheme -- "dark" so diagrams are legible on the dark palette,
  // "neutral" on light.
  function render() {
    if (!mermaidRef) { return; }
    for (var i = 0; i < blocks.length; i++) {
      blocks[i].textContent = sources[i];
      blocks[i].removeAttribute("data-processed");
    }
    mermaidRef.initialize({
      startOnLoad: false,
      securityLevel: "strict",
      theme: isDark() ? "dark" : "neutral"
    });
    mermaidRef.run({ nodes: blocks });
  }

  function run(mermaid) {
    if (!mermaid) { return; }
    mermaidRef = mermaid;
    render();
  }

  // Let the theme toggle recolor diagrams live, and follow OS scheme changes
  // while in "auto".
  window.__renderTourDiagrams = render;
  if (window.matchMedia) {
    try {
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener(
        "change", function () {
          var t = document.documentElement.getAttribute("data-theme");
          if (t !== "light" && t !== "dark") { render(); }
        });
    } catch (e) { /* older browsers: no live OS-scheme updates */ }
  }

  // Preferred path: the build script embedded the Mermaid runtime inline, so
  // globalThis.mermaid is already defined -- render straight away. The branches
  // further down are only reached for a tour rendered without that runtime.
  if (window.mermaid) { run(window.mermaid); return; }

  function fail(err) {
    if (window.console) {
      console.error("Mermaid could not be loaded; showing diagram source.", err);
    }
  }

  function loadClassic() {
    var s = document.createElement("script");
    s.src = "./mermaid.min.js";
    s.onload = function () { run(window.mermaid); };
    s.onerror = fail;
    document.head.appendChild(s);
  }

  // ES modules cannot be fetched from a file:// origin in Chromium, so use the
  // classic UMD bundle there; otherwise prefer the local ES module.
  if (location.protocol === "file:" || typeof Function.prototype.bind !== "function") {
    loadClassic();
  } else {
    try {
      import("./mermaid.esm.min.mjs")
        .then(function (m) { run(m && m.default ? m.default : window.mermaid); })
        .catch(loadClassic);
    } catch (err) {
      loadClassic();
    }
  }
})();
</script>
</body>
</html>
